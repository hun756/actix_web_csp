name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Verify MSRV build
        run: cargo test --all-features

  test:
    name: Test (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - default
          - all-features
          - no-default-features
          - extended-validation
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo test
        run: |
          case "${{ matrix.task }}" in
            default)
              cargo test
              ;;
            all-features)
              cargo test --all-features
              ;;
            no-default-features)
              cargo test --no-default-features
              ;;
            extended-validation)
              cargo test --features extended-validation
              ;;
          esac

  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint with clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Compile all examples
        run: cargo check --examples --all-features
      - name: Smoke test walkthrough examples
        run: |
          cargo run --example walkthrough_basic_policy
          cargo run --example walkthrough_nonce_flow
          cargo run --example walkthrough_presets_and_json
      - name: Run security tester example
        run: cargo run --example csp_security_tester
